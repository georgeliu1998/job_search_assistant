name: CI

on:
  # Only trigger on pull requests to master (since master branch is protected)
  pull_request:
    branches: [ master ]
  # Trigger on pushes to master branch (for post-merge verification)
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
      timeout-minutes: 3

    - name: Install dependencies
      run: |
        uv sync --extra dev --frozen
      timeout-minutes: 8

    - name: Lint with black
      run: uv run black --check src tests ui
      timeout-minutes: 3

    - name: Check imports with isort
      run: uv run isort --check-only --profile black src tests ui
      timeout-minutes: 3

    # Temporarily disabled for prototyping - re-enable during refactoring
    # - name: Type check with mypy
    #   run: uv run mypy src
    #   timeout-minutes: 5

    - name: Test with pytest
      run: uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
      timeout-minutes: 5

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      timeout-minutes: 3
